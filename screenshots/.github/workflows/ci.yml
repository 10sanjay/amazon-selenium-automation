name: Amazon Selenium Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  run-tests:
    name: Run Selenium Tests (Parallel)
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── Step 2: Set up Java 11 ───────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── Step 3: Cache Maven dependencies ────────────────────────
      - name: Cache Maven Packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Step 4: Install Google Chrome ───────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install ./google-chrome-stable_current_amd64.deb -y
          google-chrome --version

      # ── Step 5: Run Tests ────────────────────────────────────────
      - name: Run Selenium Tests
        run: mvn clean test

      # ── Step 6: Upload Extent Report ────────────────────────────
      - name: Upload Test Report
        if: always()            # upload even if tests fail
        uses: actions/upload-artifact@v3
        with:
          name: Extent-Test-Report
          path: reports/ExtentReport.html
          retention-days: 7

      # ── Step 7: Upload Screenshots (only exist on failure) ───────
      - name: Upload Failure Screenshots
        if: failure()           # only runs if tests failed
        uses: actions/upload-artifact@v3
        with:
          name: Failure-Screenshots
          path: screenshots/
          retention-days: 7

      # ── Step 8: Upload Logs ──────────────────────────────────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: Test-Logs
          path: logs/automation.log
          retention-days: 7